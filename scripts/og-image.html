<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OG Image</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 1200px;
      background: #0c0c0a;
      color: #ece9dd;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      -webkit-font-smoothing: antialiased;
      position: relative;
      padding: 56px 80px 40px;
      box-sizing: border-box;
      min-height: 630px;
    }
    .accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: #e89452;
      z-index: 2;
    }
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(#1c1c1a 1px, transparent 1px),
        linear-gradient(90deg, #1c1c1a 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse at 50% 0%, rgba(0, 0, 0, 0.7), transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 0%, rgba(0, 0, 0, 0.7), transparent 75%);
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      font-size: 19px;
      color: #a3c47e;
      font-weight: 500;
      margin: 0 0 16px;
      letter-spacing: 0.02em;
    }
    .eyebrow::before {
      content: "// ";
      color: #a3c47e;
    }
    h1 {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 60px;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin: 0;
      font-weight: 700;
      color: #ece9dd;
    }
    .tagline {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 22px;
      color: #b3afa1;
      margin: 18px 0 36px;
      line-height: 1.4;
      max-width: 1000px;
      font-weight: 400;
    }
    .terminal {
      background: #161614;
      border: 1px solid #3a3934;
      border-radius: 10px;
      overflow: hidden;
      margin: 36px 0 22px;
      max-width: 920px;
    }
    .terminal-chrome {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      background: #1c1c1a;
      border-bottom: 1px solid #2c2b27;
    }
    .terminal-dots { display: inline-flex; gap: 7px; }
    .terminal-dots span {
      display: block;
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #3a3934;
    }
    .terminal-title {
      font-size: 14px;
      color: #9b988b;
    }
    .terminal-body {
      padding: 14px 22px;
      background: #1a1a18;
      font-size: 19px;
      color: #ece9dd;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .terminal-body::before {
      content: "$";
      color: #a3c47e;
      font-weight: 600;
    }
    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #b3afa1;
      font-size: 18px;
    }
    .domain {
      color: #e89452;
      font-weight: 600;
    }
    .domain::before {
      content: "// ";
      color: #a3c47e;
    }
  </style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="grid-bg"></div>
  <div class="content">
    <p class="eyebrow">claude code · plugin marketplace</p>
    <h1>Robworks Claude Code Plugins</h1>
    <p class="tagline">MCP servers and developer-workflow plugins — free, MIT-licensed, installable in one command.</p>
    <div class="terminal">
      <div class="terminal-chrome">
        <span class="terminal-dots"><span></span><span></span><span></span></span>
        <span class="terminal-title">~/robworks $ bash</span>
      </div>
      <div class="terminal-body">
        claude plugin marketplace add ringo380/robworks-claude-code-plugins
      </div>
    </div>
    <div class="footer-row">
      <span class="domain">code.robworks.info</span>
      <span>Ryan Robson &amp; Robworks Software LLC</span>
    </div>
  </div>
</body>
</html>
