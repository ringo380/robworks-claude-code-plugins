<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OG Image</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body {
      width: 1200px;
      height: 630px;
      background: #0e0e0d;
      color: #f0efec;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }
    .accent-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 10px;
      background: linear-gradient(90deg, #d87e3a 0%, #e89452 50%, #d87e3a 100%);
    }
    .top {
      position: absolute;
      top: 70px;
      left: 80px;
      right: 80px;
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 20px;
      color: #e89452;
      font-weight: 600;
      margin: 0 0 22px;
    }
    h1 {
      font-size: 82px;
      line-height: 1.02;
      letter-spacing: -0.025em;
      margin: 0;
      font-weight: 700;
    }
    .tagline {
      font-size: 28px;
      color: #cfcfcc;
      margin: 26px 0 0;
      line-height: 1.28;
      max-width: 980px;
    }
    .bottom {
      position: absolute;
      bottom: 60px;
      left: 80px;
      right: 80px;
    }
    .footer-row {
      margin-top: 26px;
    }
    .chips {
      display: flex;
      gap: 12px;
      margin: 0 0 22px;
      flex-wrap: wrap;
    }
    .chip {
      background: #252527;
      color: #cfcfcc;
      border: 1px solid #2a2a2c;
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 20px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #a3a3a0;
      font-size: 20px;
    }
    .domain {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: #e89452;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="top">
    <p class="eyebrow">Claude Code · Plugin Marketplace</p>
    <h1>Robworks Claude Code Plugins</h1>
    <p class="tagline">MCP servers and developer workflow plugins — free, MIT-licensed, installable in one command.</p>
  </div>
  <div class="bottom">
    <div class="chips">
      <span class="chip">ga-mcp-full</span>
      <span class="chip">claude-quikgif</span>
      <span class="chip">namecheap-mcp</span>
    </div>
    <div class="footer-row">
      <span class="domain">code.robworks.info</span>
      <span>by Ryan Robson &amp; Robworks Software LLC</span>
    </div>
  </div>
</body>
</html>
